<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#5B3FD4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Git merge icon (branching lines converging) -->
  <!-- Main trunk line -->
  <line x1="256" y1="120" x2="256" y2="400" stroke="white" stroke-width="24" stroke-linecap="round"/>

  <!-- Left branch merging in -->
  <path d="M 152 180 Q 152 260 256 280" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Right branch merging in -->
  <path d="M 360 180 Q 360 240 256 260" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Commit dots on branches -->
  <circle cx="152" cy="180" r="20" fill="white"/>
  <circle cx="360" cy="180" r="20" fill="white"/>

  <!-- Main commit dots -->
  <circle cx="256" cy="140" r="20" fill="white"/>
  <circle cx="256" cy="270" r="24" fill="url(#glow)" stroke="white" stroke-width="6"/>
  <circle cx="256" cy="380" r="20" fill="white"/>

  <!-- Memory rings around merge point -->
  <circle cx="256" cy="270" r="44" stroke="#A78BFA" stroke-width="4" fill="none" opacity="0.7"/>
  <circle cx="256" cy="270" r="64" stroke="#A78BFA" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="256" cy="270" r="84" stroke="#A78BFA" stroke-width="2" fill="none" opacity="0.2"/>
</svg>
