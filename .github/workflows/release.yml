name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: action/package-lock.json

      - name: Install and build action
        working-directory: action
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # --- Action image: scan, build, push, sign ---
      - name: Build action image (scan target)
        uses: docker/build-push-action@v6
        with:
          context: action
          push: false
          load: true
          tags: mergelore/action:scan

      - name: Trivy scan action image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mergelore/action:scan
          severity: CRITICAL
          exit-code: 1

      - name: Build and push action image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: action
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/automationpi/mergelore-action:latest
            ghcr.io/automationpi/mergelore-action:${{ steps.version.outputs.tag }}
            mergelore/action:latest
            mergelore/action:${{ steps.version.outputs.tag }}

      # --- Indexer image: scan, build, push, sign ---
      - name: Build indexer image (scan target)
        uses: docker/build-push-action@v6
        with:
          context: indexer
          push: false
          load: true
          tags: mergelore/indexer:scan

      - name: Trivy scan indexer image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mergelore/indexer:scan
          severity: CRITICAL
          exit-code: 1

      - name: Build and push indexer image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: indexer
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/automationpi/mergelore-indexer:latest
            ghcr.io/automationpi/mergelore-indexer:${{ steps.version.outputs.tag }}
            mergelore/indexer:latest
            mergelore/indexer:${{ steps.version.outputs.tag }}

      # --- Cosign keyless signing ---
      - name: Install cosign
        if: github.repository == 'automationpi/mergelore'
        uses: sigstore/cosign-installer@v3

      - name: Sign action images
        if: github.repository == 'automationpi/mergelore'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/automationpi/mergelore-action:${{ steps.version.outputs.tag }}
          cosign sign --yes mergelore/action:${{ steps.version.outputs.tag }}

      - name: Sign indexer images
        if: github.repository == 'automationpi/mergelore'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/automationpi/mergelore-indexer:${{ steps.version.outputs.tag }}
          cosign sign --yes mergelore/indexer:${{ steps.version.outputs.tag }}

      # --- GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: action/dist/index.js
