name: mergelore dogfood

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./action
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          memory-provider: git-native
          confidence-threshold: "0.5"
