# Using OpenAI (gpt-4o) instead of Claude for PR analysis
# Everything else works the same - just swap the provider and API key.
#
# Secrets needed:
#   OPENAI_API_KEY - get one at https://platform.openai.com

name: mergelore
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: automationpi/mergelore/action@v0.2.1
        with:
          llm-provider: openai
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
