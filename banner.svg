<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- ======================== LEFT: AI Code ======================== -->
  <rect x="40" y="80" width="320" height="400" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">AI CODE GENERATION</text>

  <!-- Code lines -->
  <rect x="65" y="140" width="120" height="8" rx="4" fill="#7B61FF" opacity="0.5"/>
  <rect x="65" y="158" width="200" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="65" y="176" width="160" height="8" rx="4" fill="#475569" opacity="0.5"/>

  <!-- Bad lines (red) -->
  <rect x="80" y="200" width="230" height="10" rx="4" fill="#EF4444" opacity="0.35"/>
  <rect x="80" y="220" width="190" height="10" rx="4" fill="#EF4444" opacity="0.35"/>
  <rect x="80" y="240" width="210" height="10" rx="4" fill="#EF4444" opacity="0.35"/>

  <rect x="65" y="264" width="180" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="65" y="282" width="220" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="80" y="306" width="200" height="10" rx="4" fill="#EF4444" opacity="0.35"/>
  <rect x="65" y="330" width="150" height="8" rx="4" fill="#475569" opacity="0.5"/>

  <!-- Warning label -->
  <rect x="65" y="370" width="270" height="32" rx="8" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="1" opacity="0.3"/>
  <text x="80" y="391" fill="#F87171" font-family="monospace, monospace" font-size="12">re-introduces removed pattern</text>

  <!-- Bot icon -->
  <rect x="65" y="420" width="100" height="24" rx="12" fill="#475569" opacity="0.3"/>
  <text x="78" y="436" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Copilot / Claude</text>

  <!-- ======================== ARROW: AI to PR ======================== -->
  <line x1="370" y1="280" x2="425" y2="280" stroke="#64748B" stroke-width="2" stroke-dasharray="8,5"/>
  <polygon points="425,274 440,280 425,286" fill="#64748B"/>

  <!-- ======================== CENTER: The PR ======================== -->
  <rect x="445" y="130" width="310" height="340" rx="12" fill="#1e293b" stroke="#7B61FF" stroke-width="2"/>

  <!-- PR header bar -->
  <rect x="445" y="130" width="310" height="46" rx="12" fill="#7B61FF" opacity="0.12"/>
  <rect x="445" y="164" width="310" height="2" fill="#7B61FF" opacity="0.2"/>
  <circle cx="472" cy="153" r="7" fill="#34D399"/>
  <text x="488" y="158" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Pull Request #248</text>

  <!-- Diff lines -->
  <rect x="468" y="190" width="16" height="13" rx="3" fill="#EF4444" opacity="0.25"/>
  <text x="472" y="200" fill="#EF4444" font-family="monospace, monospace" font-size="9">-</text>
  <rect x="490" y="193" width="180" height="7" rx="3" fill="#475569" opacity="0.4"/>

  <rect x="468" y="212" width="16" height="13" rx="3" fill="#34D399" opacity="0.25"/>
  <text x="472" y="222" fill="#34D399" font-family="monospace, monospace" font-size="9">+</text>
  <rect x="490" y="215" width="210" height="7" rx="3" fill="#475569" opacity="0.4"/>

  <rect x="468" y="234" width="16" height="13" rx="3" fill="#34D399" opacity="0.25"/>
  <text x="472" y="244" fill="#34D399" font-family="monospace, monospace" font-size="9">+</text>
  <rect x="490" y="237" width="160" height="7" rx="3" fill="#475569" opacity="0.4"/>

  <rect x="468" y="256" width="16" height="13" rx="3" fill="#34D399" opacity="0.25"/>
  <text x="472" y="266" fill="#34D399" font-family="monospace, monospace" font-size="9">+</text>
  <rect x="490" y="259" width="190" height="7" rx="3" fill="#475569" opacity="0.4"/>

  <!-- ---- mergelore finding card ---- -->
  <rect x="462" y="290" width="280" height="110" rx="10" fill="#7B61FF" opacity="0.08" stroke="#7B61FF" stroke-width="1.5"/>

  <!-- mergelore avatar -->
  <circle cx="482" cy="314" r="11" fill="#7B61FF"/>
  <circle cx="478" cy="311" r="2.5" fill="white"/>
  <circle cx="486" cy="311" r="2.5" fill="white"/>
  <rect x="476" y="316" width="12" height="2" rx="1" fill="white"/>

  <text x="500" y="318" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="13" font-weight="700">mergelore finding</text>

  <!-- Confidence badge -->
  <rect x="680" y="304" width="50" height="22" rx="11" fill="#FBBF24" opacity="0.15" stroke="#FBBF24" stroke-width="1"/>
  <text x="692" y="319" fill="#FBBF24" font-family="monospace, monospace" font-size="11" font-weight="700">0.92</text>

  <text x="480" y="345" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="11">Conflicts with PR #142 (3 months ago)</text>
  <text x="480" y="362" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Legacy auth was removed for GDPR</text>
  <text x="480" y="379" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">compliance. This PR re-introduces it.</text>

  <!-- Slash commands -->
  <rect x="468" y="410" width="90" height="18" rx="4" fill="#334155"/>
  <text x="478" y="422" fill="#94A3B8" font-family="monospace, monospace" font-size="8">/acknowledge</text>
  <rect x="565" y="410" width="75" height="18" rx="4" fill="#334155"/>
  <text x="575" y="422" fill="#94A3B8" font-family="monospace, monospace" font-size="8">/override</text>
  <rect x="647" y="410" width="85" height="18" rx="4" fill="#334155"/>
  <text x="657" y="422" fill="#94A3B8" font-family="monospace, monospace" font-size="8">/update-record</text>

  <!-- ======================== RIGHT: Memory ======================== -->
  <rect x="840" y="80" width="320" height="400" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1000" y="115" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">INSTITUTIONAL MEMORY</text>

  <!-- PR #142 - highlighted match -->
  <rect x="862" y="138" width="276" height="56" rx="8" fill="#7B61FF" opacity="0.12" stroke="#7B61FF" stroke-width="2"/>
  <circle cx="878" cy="158" r="5" fill="#7B61FF"/>
  <text x="890" y="162" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="12" font-weight="700">PR #142 - Remove legacy auth</text>
  <text x="890" y="180" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">3 months ago  -  compliance / GDPR</text>

  <!-- PR #287 -->
  <rect x="862" y="206" width="276" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="878" cy="226" r="5" fill="#475569"/>
  <text x="890" y="230" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PR #287 - Redis pool post-mortem</text>
  <text x="890" y="248" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">5 months ago  -  production outage fix</text>

  <!-- PR #412 -->
  <rect x="862" y="274" width="276" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="878" cy="294" r="5" fill="#475569"/>
  <text x="890" y="298" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PR #412 - DB migration policy</text>
  <text x="890" y="316" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">2 months ago  -  table lock incident</text>

  <!-- PR #203 -->
  <rect x="862" y="342" width="276" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="878" cy="362" r="5" fill="#475569"/>
  <text x="890" y="366" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PR #203 - Hardcode rate limit</text>
  <text x="890" y="384" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">4 months ago  -  billing service incident</text>

  <!-- PR #156 -->
  <rect x="862" y="410" width="276" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="878" cy="430" r="5" fill="#475569"/>
  <text x="890" y="434" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PR #156 - WCAG dropdown fix</text>
  <text x="890" y="452" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">6 months ago  -  accessibility audit</text>

  <!-- ======================== CONNECTION: Memory to Finding ======================== -->
  <!-- Curved line from PR #142 to mergelore finding -->
  <path d="M 862 166 Q 800 166 780 240 Q 760 310 742 340" stroke="#7B61FF" stroke-width="2.5" stroke-dasharray="8,4" fill="none"/>
  <polygon points="746,334 738,346 750,344" fill="#7B61FF"/>

  <!-- Arrow label -->
  <rect x="770" y="228" width="64" height="20" rx="10" fill="#7B61FF" opacity="0.2"/>
  <text x="782" y="242" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="9" font-weight="600">matched</text>

  <!-- ======================== BOTTOM TAGLINE ======================== -->
  <text x="600" y="540" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="20" font-weight="700">AI writes code. mergelore remembers why it was changed before.</text>
  <text x="600" y="568" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="13">Open source institutional memory for pull requests</text>
</svg>
