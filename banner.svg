<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#6EE7B7"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F87171"/>
      <stop offset="100%" style="stop-color:#FCA5A5"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Left side: AI generating code -->
  <!-- AI bot icon -->
  <rect x="60" y="120" width="300" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="210" y="160" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">AI CODE GENERATION</text>

  <!-- Code lines -->
  <rect x="85" y="185" width="140" height="10" rx="3" fill="#7B61FF" opacity="0.6"/>
  <rect x="85" y="205" width="200" height="10" rx="3" fill="#64748B" opacity="0.4"/>
  <rect x="85" y="225" width="170" height="10" rx="3" fill="#64748B" opacity="0.4"/>
  <rect x="100" y="245" width="220" height="10" rx="3" fill="#F87171" opacity="0.5"/>
  <rect x="100" y="265" width="180" height="10" rx="3" fill="#F87171" opacity="0.5"/>
  <rect x="85" y="285" width="160" height="10" rx="3" fill="#64748B" opacity="0.4"/>
  <rect x="85" y="305" width="210" height="10" rx="3" fill="#64748B" opacity="0.4"/>
  <rect x="100" y="325" width="190" height="10" rx="3" fill="#F87171" opacity="0.5"/>
  <rect x="85" y="345" width="150" height="10" rx="3" fill="#64748B" opacity="0.4"/>

  <!-- Red label: pattern reversal -->
  <rect x="85" y="380" width="250" height="28" rx="6" fill="#F87171" opacity="0.15"/>
  <text x="100" y="399" fill="#F87171" font-family="monospace" font-size="11">re-introduces removed pattern</text>

  <!-- Arrow: AI to PR -->
  <line x1="370" y1="300" x2="430" y2="300" stroke="#64748B" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="430,294 442,300 430,306" fill="#64748B"/>

  <!-- Center: The PR -->
  <rect x="450" y="170" width="300" height="260" rx="12" fill="#1e293b" stroke="#7B61FF" stroke-width="2"/>

  <!-- PR header -->
  <rect x="450" y="170" width="300" height="44" rx="12" fill="#7B61FF" opacity="0.15"/>
  <circle cx="475" cy="192" r="8" fill="#34D399"/>
  <text x="492" y="197" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Pull Request #248</text>

  <!-- PR diff lines -->
  <rect x="472" y="230" width="18" height="14" rx="3" fill="#F87171" opacity="0.3"/>
  <text x="476" y="241" fill="#F87171" font-family="monospace" font-size="10">-</text>
  <rect x="496" y="232" width="180" height="10" rx="3" fill="#64748B" opacity="0.3"/>

  <rect x="472" y="252" width="18" height="14" rx="3" fill="#34D399" opacity="0.3"/>
  <text x="476" y="263" fill="#34D399" font-family="monospace" font-size="10">+</text>
  <rect x="496" y="254" width="200" height="10" rx="3" fill="#64748B" opacity="0.3"/>

  <rect x="472" y="274" width="18" height="14" rx="3" fill="#34D399" opacity="0.3"/>
  <text x="476" y="285" fill="#34D399" font-family="monospace" font-size="10">+</text>
  <rect x="496" y="276" width="160" height="10" rx="3" fill="#64748B" opacity="0.3"/>

  <!-- mergelore finding box -->
  <rect x="470" y="310" width="260" height="100" rx="8" fill="#7B61FF" opacity="0.1" stroke="#7B61FF" stroke-width="1.5"/>

  <!-- mergelore icon -->
  <circle cx="488" cy="330" r="10" fill="#7B61FF" opacity="0.8"/>
  <line cx="488" y1="322" x2="488" y2="338" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="484" cy="326" r="3" fill="white"/>
  <circle cx="492" cy="326" r="3" fill="white"/>

  <text x="504" y="335" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="12" font-weight="700">mergelore finding</text>

  <text x="484" y="358" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">Conflicts with PR #142</text>
  <text x="484" y="373" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">Pattern was removed for</text>
  <text x="484" y="388" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">compliance reasons</text>

  <!-- Confidence badge -->
  <rect x="660" y="320" width="56" height="20" rx="10" fill="#FBBF24" opacity="0.2"/>
  <text x="670" y="334" fill="#FBBF24" font-family="monospace" font-size="10" font-weight="700">0.92</text>

  <!-- Right side: Memory / History -->
  <rect x="840" y="120" width="300" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="990" y="160" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">INSTITUTIONAL MEMORY</text>

  <!-- Past PR cards -->
  <rect x="862" y="185" width="256" height="52" rx="8" fill="#7B61FF" opacity="0.08" stroke="#7B61FF" stroke-width="1" opacity="0.3"/>
  <text x="878" y="207" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PR #142 - Remove legacy auth</text>
  <text x="878" y="225" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">3 months ago - compliance decision</text>

  <rect x="862" y="248" width="256" height="52" rx="8" fill="#7B61FF" opacity="0.05" stroke="#334155" stroke-width="1"/>
  <text x="878" y="270" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PR #287 - Redis pool fix</text>
  <text x="878" y="288" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">5 months ago - post-mortem action</text>

  <rect x="862" y="311" width="256" height="52" rx="8" fill="#7B61FF" opacity="0.05" stroke="#334155" stroke-width="1"/>
  <text x="878" y="333" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PR #412 - Migration policy</text>
  <text x="878" y="351" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">2 months ago - table lock incident</text>

  <rect x="862" y="374" width="256" height="52" rx="8" fill="#7B61FF" opacity="0.05" stroke="#334155" stroke-width="1"/>
  <text x="878" y="396" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PR #203 - Hardcode rate limit</text>
  <text x="878" y="414" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">4 months ago - billing incident</text>

  <!-- Glowing connection line from PR #142 to finding -->
  <rect x="862" y="185" width="256" height="52" rx="8" fill="#7B61FF" opacity="0.15" stroke="#7B61FF" stroke-width="2"/>

  <!-- Arrow: Memory to PR -->
  <line x1="840" y1="210" x2="760" y2="340" stroke="#7B61FF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="764,334 756,346 768,344" fill="#7B61FF"/>

  <!-- Bottom tagline -->
  <text x="600" y="540" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">AI writes code. mergelore remembers why it was changed before.</text>

  <text x="600" y="570" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="14">Open source institutional memory for pull requests</text>
</svg>
