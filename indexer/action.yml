name: mergelore-indexer
description: Index merged PRs into a vector store for mergelore institutional memory
author: automationpi

branding:
  icon: database
  color: blue

inputs:
  embed-model:
    description: "Embedding model: bge-small-en-v1.5 (default, local) | all-MiniLM-L6-v2 | nomic-embed-text-v1.5 | text-embedding-3-small (OpenAI) | embed-english-v3.0 (Cohere)"
    default: bge-small-en-v1.5
  qdrant-url:
    description: Qdrant URL (e.g., http://qdrant:6333)
    required: true

runs:
  using: docker
  image: Dockerfile
  env:
    MERGELORE_EMBED_MODEL: ${{ inputs.embed-model }}
    MERGELORE_QDRANT_URL: ${{ inputs.qdrant-url }}
